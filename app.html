<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOWERBIRD PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
    <link rel="icon" href="assets/images/bowerbirdpro.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>

<body id="page-app">
    <div class="container">
        <div class="main-layout">
            <div class="left-panel">
                <div class="left-card logo-card">
                    <a href="index.html" class="logo">
                        <img src="assets/images/bowerbirdpro_logo.png" alt="Bowerbird Pro 로고">
                        <div>
                            <div class="logo-title">BOWERBIRD <span style="color: #f44336;">PRO</span></div>
                            <div class="logo-subtitle" data-translate="appSubtitle">Real-Time Data Logger & Plotter
                            </div>
                        </div>
                    </a>
                </div>

                <div class="left-card settings-card">
                    <div class="section">
                        <h3 data-translate="connectionSettings">연결 설정</h3>

                        <div class="form-group">
                            <label for="languageSelector" data-translate="language">언어</label>
                            <select id="languageSelector"></select>
                        </div>

                        <div class="form-group">
                            <label for="deviceType" data-translate="deviceType">*통신 유형</label>
                            <select id="deviceType">
                                <option value="serial" data-translate="serialPort">시리얼 통신</option>
                                <option value="bluetooth" data-translate="bluetoothLE">블루투스 통신</option>
                            </select>
                        </div>
                        <div id="serialSettings">
                            <div class="form-group">
                                <label for="baudRate" data-translate="baudRateLabel">보드레이트</label>
                                <select id="baudRate">
                                    <option value="4800">4800</option>
                                    <option value="9600" selected>9600</option>
                                    <option value="19200">19200</option>
                                    <option value="38400">38400</option>
                                    <option value="57600">57600</option>
                                    <option value="115200">115200</option>
                                    <option value="230400">230400</option>
                                    <option value="460800">460800</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="delimiter" data-translate="delimiterLabel">데이터 구분자</label>
                            <select id="delimiter">
                                <option value="," selected>Comma (,)</option>
                                <option value="\t">Tab</option>
                                <option value=" ">Space</option>
                                <option value=";">Semicolon (;)</option>
                            </select>
                        </div>
                        <div id="bleSettings" style="display: none;">
                            <div class="form-group">
                                <label for="bleDeviceType" data-translate="bleDevice">BLE 장치</label>
                                <select id="bleDeviceType">
                                    <option value="microbit" data-translate="microbit">마이크로비트</option>
                                    <option value="generic" data-translate="genericUart">ESP32, PICO-W</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="bleCustomService" data-translate="bleServiceUUID">Service UUID</label>
                                <input type="text" id="bleCustomService" placeholder="Optional custom UUID" style="font-size:0.8rem;">
                            </div>
                            <div class="form-group">
                                <label for="bleCustomRx" data-translate="bleRxUUID">RX UUID</label>
                                <input type="text" id="bleCustomRx" placeholder="Optional custom UUID" style="font-size:0.8rem;">
                            </div>
                        </div>
                        <button id="connectBtn" class="btn btn-connect" data-translate="connectSerial">시리얼 연결</button>
                        <div style="margin-top: 8px; display: flex; align-items: center; gap: 6px;">
                            <span id="statusLed" class="status-led disconnected"></span>
                            <span id="sampleRate" style="font-size: 0.75rem; color: #888;"></span>
                        </div>
                        <div id="sendCommandDiv" style="margin-top: 8px; display: flex; gap: 4px;">
                            <input type="text" id="sendCommandInput" placeholder="Send command..." style="flex:1; padding:4px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;">
                            <button id="btnSendCommand" class="btn-xs btn-outline" data-translate="send">Send</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="button-group" style="flex-wrap: nowrap;">
                            <button id="startLogging" class="btn btn-start" style="white-space:nowrap;" data-translate="start">시작</button>
                            <button id="pauseLogging" class="btn btn-pause" style="white-space:nowrap;" disabled
                                data-translate="pause">일시정지</button>
                            <button id="stopLogging" class="btn btn-stop" style="white-space:nowrap;" disabled data-translate="stop">정지</button>
                        </div>
                    </div>

                    <div class="section">
                        <h3 data-translate="sensorSettings">센서 설정</h3>
                        <div class="form-group">
                            <label for="sensorCount" data-translate="sensorCount">센서 개수</label>
                            <input type="number" id="sensorCount" value="1" min="1" max="10">
                        </div>
                        <div class="sensor-section-header">
                            <label data-translate="sensorNameSettings">센서 이름 설정</label>
                            <div id="sensorInputs" class="sensor-inputs-container">
                            </div>
                        </div>
                        <div id="alarmSettings" style="margin-top: 4px;">
                            <h4 style="font-size: 0.75rem; color: #555;" data-translate="alarmSettings">알람 설정</h4>
                            <div id="alarmInputs"></div>
                        </div>
                    </div>

                    <div class="section">
                        <h3 data-translate="dataAnalysis">데이터 분석 도구</h3>
                        <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px;">
                            <button id="btnDerivative" class="btn-xs btn-outline" style="flex: 1; font-size: 0.75rem;"
                                data-translate="calcDerivative">Derivative</button>
                            <button id="btnIntegral" class="btn-xs btn-outline" style="flex: 1; font-size: 0.75rem;"
                                data-translate="calcIntegral">Integral</button>
                        </div>
                        <div style="display: flex; gap: 5px; align-items: center; flex-wrap: wrap;">
                            <label style="font-size: 0.75rem; color: #555; display: inline-flex; align-items: center; gap: 3px; white-space: nowrap;">
                                <input type="checkbox" id="smoothingToggle">
                                <span data-translate="toolSmoothing">스무딩</span>
                            </label>
                            <select id="smoothingType"
                                style="padding: 2px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.7rem; max-width: 80px;"
                                disabled>
                                <option value="ma">Mov. Avg</option>
                                <option value="sg">Sav-Golay</option>
                            </select>
                            <input type="range" id="smoothingWindow" min="3" max="51" step="2" value="5" style="flex:1; min-width:40px;" disabled>
                            <span id="smoothingWindowValue" style="font-size:0.7rem; min-width:16px;">5</span>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <label style="font-size: 0.75rem; color: #555; display: inline-flex; align-items: center; gap: 3px; white-space: nowrap;">
                                <input type="checkbox" id="outlierToggle">
                                <span data-translate="toolOutlier">이상치 제거</span>
                            </label>
                        </div>
                    </div>
                    <!-- CSV Import & Info -->
                    <div class="section">
                        <h3 data-translate="dataImport">데이터 가져오기</h3>
                        <input type="file" id="csvFileInput" accept=".csv,.txt" style="display: none;">
                        <button id="btnExportCSV" class="btn-xs btn-outline" style="width: 100%; font-size: 0.75rem; margin-bottom: 4px;"
                            data-translate="exportCSV">CSV 저장하기</button>
                        <button id="btnImportCSV" class="btn-xs btn-outline" style="width: 100%; font-size: 0.75rem; margin-bottom: 4px;"
                            data-translate="importCSV">CSV 불러오기</button>
                        <a href="information.html" target="_blank" class="btn btn-info" data-translate="info"
                            style="width: 100%; text-align: center; display: block; padding: 4px; font-size: 0.75rem; margin-bottom: 4px;">바우어버드 프로 안내</a>
                        <a href="https://brixel-editor.github.io/" target="_blank" class="btn btn-info"
                            style="width: 100%; text-align: center; display: block; padding: 4px; font-size: 0.75rem; margin-bottom: 4px;">브릭셀 에디터 바로가기</a>
                        <a href="https://circuit.gorillacell.kr/" target="_blank" class="btn btn-info"
                            style="width: 100%; text-align: center; display: block; padding: 4px; font-size: 0.75rem;">브릭셀 써킷 콘픽 바로가기</a>
                    </div>
                </div>

            </div>

            <div class="right-panel">
                <div class="logs-container">
                    <div class="log-section" id="consoleLogSection">
                        <h4 class="log-toggle" onclick="toggleLogSection('consoleLogSection')" data-translate="consoleLog">&#9660; 콘솔 로그</h4>
                        <div class="log-body">
                            <div id="consoleLog" class="log-content"></div>
                        </div>
                    </div>
                    <div class="log-section" id="dataLogSection">
                        <h4 class="log-toggle" onclick="toggleLogSection('dataLogSection')" data-translate="receivedDataLog">&#9660; 수신 데이터 로그</h4>
                        <div class="log-body">
                            <input type="text" id="logSearch" placeholder="Search..." style="width:100%;padding:2px 4px;font-size:0.65rem;margin-bottom:2px;border:1px solid #ccc;border-radius:3px;">
                            <div id="dataLog" class="log-content"></div>
                        </div>
                    </div>
                    <div class="log-section analysis-section" id="analysisSection">
                        <h4 class="log-toggle" onclick="toggleLogSection('analysisSection')" data-translate="dataAnalysis">&#9660; 데이터 분석</h4>
                        <div class="log-body">
                            <div class="analysis-controls"
                                style="margin-bottom: 3px; padding-bottom: 2px; border-bottom: 1px solid #eee; display: flex; flex-wrap: nowrap; gap: 3px; align-items: center; white-space: nowrap;">
                                <select id="regressionTypeSelect"
                                    style="padding: 1px 2px; border-radius: 3px; border: 1px solid #ccc; font-size: 0.6rem; max-width: 50%;">
                                    <option value="linear" selected data-translate="regLinear">Linear</option>
                                    <option value="polynomial" data-translate="regPolynomial">Polynomial</option>
                                    <option value="exponential" data-translate="regExponential">Exponential</option>
                                    <option value="power" data-translate="regPower">Power</option>
                                    <option value="logarithmic" data-translate="regLogarithmic">Logarithmic</option>
                                </select>
                                <select id="polynomialOrder" style="padding:2px;border-radius:3px;border:1px solid #ccc;font-size:0.65rem;display:none;">
                                    <option value="2">2nd</option>
                                    <option value="3">3rd</option>
                                    <option value="4">4th</option>
                                    <option value="5">5th</option>
                                </select>
                                <label style="font-size: 0.6rem; color: #555; display: inline-flex; align-items: center; gap: 2px; cursor: pointer; margin: 0; white-space: nowrap;">
                                    <span data-translate="scopeViewport">뷰포트</span>
                                    <input type="checkbox" id="analysisScopeToggle" style="margin: 0;">
                                    <span data-translate="scopeAll">전체</span>
                                </label>
                            </div>
                            <div id="analysisResult" class="log-content analysis-content">
                                <div class="analysis-placeholder" data-translate="selectRangeHint">차트를 드래그하여 구간을 선택하세요.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="chart-container">
                    <div class="chart-controls" style="margin-bottom: 3px; display: flex; align-items: center; flex-wrap: nowrap; justify-content: flex-end; gap: 3px; white-space: nowrap; overflow-x: auto; font-size: 0.7rem;">
                        <label style="color: #555; display: inline-flex; align-items: center; gap: 2px;">
                            <input type="checkbox" id="individualYAxis" style="margin:0;">
                            <span data-translate="individualYAxis">Y축</span>
                        </label>
                        <label style="color: #555; display: inline-flex; align-items: center; gap: 1px;">
                            Y<sub>min</sub><input type="number" id="yAxisMin" style="width: 45px; padding: 1px 3px; font-size: 0.65rem;" placeholder="auto">
                        </label>
                        <label style="color: #555; display: inline-flex; align-items: center; gap: 1px;">
                            Y<sub>max</sub><input type="number" id="yAxisMax" style="width: 45px; padding: 1px 3px; font-size: 0.65rem;" placeholder="auto">
                        </label>
                        <span style="border-left: 1px solid #ddd; margin: 0 2px; height: 14px;"></span>
                        <button class="btn-xs btn-outline" data-zoom="1">1s</button>
                        <button class="btn-xs btn-outline" data-zoom="10">10s</button>
                        <button class="btn-xs btn-outline" data-zoom="60">1m</button>
                        <button class="btn-xs btn-outline" data-zoom="300">5m</button>
                        <button class="btn-xs btn-outline" data-zoom="all">All</button>
                        <button class="btn-xs btn-primary" data-zoom="auto" data-translate="autoScroll">Auto</button>
                        <span style="border-left: 1px solid #ddd; margin: 0 2px; height: 14px;"></span>
                        <button id="btnExportChart" class="btn-xs btn-outline" data-translate="exportChart" title="Save chart as PNG">PNG</button>
                    </div>
                    <canvas id="dataChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleLogSection(id) {
            const section = document.getElementById(id);
            if (!section) return;
            const h4 = section.querySelector('h4');
            const isCollapsed = section.classList.toggle('collapsed');
            // Update arrow indicator
            const text = h4.textContent.replace(/^[\u25B6\u25BC]\s*/, '');
            h4.textContent = (isCollapsed ? '\u25B6 ' : '\u25BC ') + text;
            // Adjust logs-container height based on collapsed state
            updateLogsHeight();
        }

        function updateLogsHeight() {
            const container = document.querySelector('.logs-container');
            if (!container) return;
            const sections = container.querySelectorAll('.log-section');
            const allCollapsed = Array.from(sections).every(s => s.classList.contains('collapsed'));
            if (allCollapsed) {
                container.classList.add('all-collapsed');
            } else {
                container.classList.remove('all-collapsed');
            }
        }
    </script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
